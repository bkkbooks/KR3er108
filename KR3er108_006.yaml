body:
  text: 卷六治諸癤等患化毒方治一切癰疽瘡癤未成者速散已成者速潰敗膿自出無假手擠惡肉自去不犯針刀服藥後疼痛頓減此其常用者效也此方得自於都下異人時有苦背瘍者七十餘頭諸藥試遍不獲痊準備衆醫環立如堵出是方示之相目而笑曰是豈癰背所有藥耶固謂之曰古人用方自有意義觀其所用藥性平和縱未以已疾必不能壞病服之何害乃治此方藥與之以熟酒一升許下藥五六錢少頃減七分數服後瘡大潰膿血流逆若用物自內托出服之半月瘡口遂合若未常有所苦者又有苦腹疾者其痛異常醫者莫曉時意謂此藥大能止痛試與餌之當日下濃二三碗許痛亦逐止思察之乃腹癰也又一老人忽胸間發腫根腳甚大毒氣上攻如一瓢然斜捕頂石不能轉動遂以此藥與服明日腫毒既散餘一小瘤如粟米大又明日怗然如故無事又一人發腦疑此不能救逐殞於庸醫手次年其子後苦此疾與父無異病狀一同因懲父之失縱飲酒服此藥而至不覺大醉竟日衰臥地上及至酒醒病已去矣又一婦人髮乳焮腫疼痛日夜叫聲不絶哀苦之音皆不忍聞自謂無生理又有一婦人股間發腫大如杯碗服此藥皆脫然如失物是藥濟苦者不可記數姑托一二以示大略大隻癰疽之作無非氣血凝滯風毒壅結或飲酒食熱物過多房室虛甚榮衛不調所致治之不早則外壞肌肉攻臟腑去生遠矣詳味此方其所用藥皆發散內毒調理氣血排膿止痛生肌長肉等藥五毒不試而坐收瘍醫十全之功其可悉述乎悉述作尚巳人參用新羅者團結重尖滋潤者洗淨去盧薄切焙乾防風擇新者淨洗切焙當歸取川中來者澤大念澤作擇今作個如馬尾狀滋潤甜辣者香芬者溫水洗薄切焙乾黃耆川綿者為良狀狀下有如字箭誤乾者長一二尺不開者洗淨寸截槌碎擘如系狀以鹽湯浸透微火灸酥再銼入衆藥中芎藭川中者為上今多止是撫芎不用淨洗淨焙乾厚朴宜用梓州來者厚而紫掐乏油色者佳去鹿鹿當作粗皮切薑汁淹一兩焙炒白芷枯梗以有心味者為真無心味苦者薺苨也切勿誤用洗淨去頭薄切焙乾入衆藥桂宜用卷薄者古法帶皮桂每兩止取二錢半用一兩者當買四兩內取一兩好者不見火甘草生上十味選藥貴精者皆取淨曬乾極燥方稱人參當歸黃耆各二兩其他七味各一兩除桂外一處為末入桂今勻每服三錢漸加至五六錢熱酒調日數服以多為妙服至瘡口合更服為佳所以補前損杜後患也不飲酒濃煎木香湯下然不若酒力之勝也或飲酒不多能勉強間用酒調下並木香湯解酒切效當不減於酒也又方治一切惡核瘰癧癰疽等病及惡腫青木香沉香乳香麝香升麻獨活連翹桑寄生木通夜千道按夜千即射干已上一兩大黃大黃下有五兩字上㕮咀乃為銼散也銼今如麻豆大也每服四錢水二盞煎至一盞已上去滓取八分清汁空心熱服半日巳上未利再服以快為度或下惡物未生肉巳前時服不妨以析毒熱之氣或有人使竹瀝芒硝恐有藥之人不能斟量是故不載知者當自相度用之又方治癰疽發背丹疹赤腫惡肉時行熱毒變作赤雜及眼赤痛生障醫病方黃芩白芨麻黃去節漏盧真者白薇枳殼麩炒去穰升麻白芍藥川當歸川牛膝甘草各二兩上為粗末每服四錢水一盞半煎至七分空心熱服或利一二行利再服或加芒硝三錢未成者散去巳成者立潰癰癤藥中無如此三方妙絶余每用濟人不少凡有患癰癤發背等疾服此二三藥獲安之後宜常服四物湯交和黃耆建中湯空心煎服未來恐疾再作傳其難又兼費財不祕者者下有欲天下人安故也七字治發背內潰及諸惡毒衝心嘔吐疼痛不可忍三兩服可救一命應干瘡毒癰疽等疾每日一服無不除愈幾托毒氣使出胩處不至內攻乳香散録豆粉四兩乳香一兩上二物再同碾極細每服一錢新汲水調下水不宜多要藥停在胸也甚妙治諸水腫氣疾治十腫水病並根源證狀方法一蒸水先從左右肋腫根在肝藥是大戟二赤水從舌根起根在心葶藶子三黃水從腹腫起根在心葶藶子四白水從腳起根有肺稿本五黑水從險外腎也腫起根在腎連翹六玄水從面腫起根在外腎芫花七風水從四肢腫起根在骨澤瀉八石水從腎腫起根在膀胱桑根白皮九蒿水從滿腹腫起根在小腸巴豆十氣水或成或衰根在腹赤小豆道胺成當作盛字上十般腫病各有根源種不同看十腫病根除一味用將九味等分遂味用制者依法修治焙為細末煉蜜為圓用赤茯苓湯吞下不拘時候其圓如梧桐子大每日三服忌鹽一百二十日緣鹽能化水故也然忌魚鮓麵食一切毒物及生冷等物及不得行房事此病去生甚遠取死將近或得良醫醫者得余此方慎勿輕賤雖千金難換但余欲天下人安故也用此方獲瘥這後更用後來補藥補藥方肉桂去粗皮青皮去白乾薑湯洗莪朮醋煮軟川芎肉豆蔻雞心檳榔桔梗各等分依法制治上等分治為末每服三錢百沸湯點服空心食前日午食前晚食前各一服前項二方治水腫病餘遂百計來此醫人多酬黃白之物遂得此二方余試用這百發百中獲濟者無數世間所有水病方藥無柴二方之右者余初出本事方前集尚有此後集二帙初深祕之今見前集已盛行於世此後集今亦略傳一二仁者使天下皆得躋盡天年母羅枉斃云治婦人經脈不通即黃水水流四肢則遍身皆腫名曰血分其候與水腫相類一等庸醫不問源流便作水疾治之非唯無效又恐喪命此乃醫殺之也宜用此方力效人參川當歸瞿麥穗大黃濕紙里二升米上蒸米熟去紙焙乾赤芍藥桂去皮白茯苓已上各半兩苦葶藶炒二分上為細末煉蜜圓如梧桐子大每服十五圓空心米飲下漸加二十圓止於三十圓每無不效者治諸瀉痢疾附大便祕治冷熱痢疾無疾字有等患二字鶯粟殼二兩白薑三錢重甘草五錢重芥葉半兩白薑即乾薑上件㕮咀分作每服人蜜十文用水一盞煎至七分溫服空心下治一切痢砒霜黃丹各等分上同研細用黃蠟溶和藥末為膏旋圓如録豆大每服三圓飯飲下小兒圓如粟米大飯飲下忌葷腥治赤白痢赤芍藥香附子炒去毛地榆等分上三味處為末留心認記赤痢用赤芍藥末一錢香附末半錢地榆末例用一錢蜜一七水一盞煎五七沸空心溫服白痢香附子末一錢芍藥半錢地榆一錢蜜一七水一盞同煮至七分空心溫服日二服小兒加減速與之治脾胃有積臟腑不寧冷熱相摶遂赤白痢不思飲食腹痛不可忍並皆治之罌粟殼四兩蜜炙川當歸半兩甘草同炙白芍藥桂去粗皮訶子白善土道按白善土即白亞土煅各半兩上為細末每服五錢沸湯點服空心服或用生薑二片棗子二枚同煎至七分空心服尤妙又方茱萸黃連阿膠白芍藥等分同妙今焦黃色上為細末麵糊為圓如梧桐子大每服三十圓陳米飲下小兒十圓又方黑豆五十粒陳皮半兩罌粟殼十四個甘草三寸上四味半生半炒用水一碗藥散四錢煎至七分空心溫服盡此一劑無不效者治瀉痢白石脂乾薑等分上為末麵糊不圓如梧桐子大每服三十圓飯飲空心送下霍亂吐瀉漿水下治水瀉並赤白痢草烏大者一兩半上將一半燒灰一半生用為末醋糊為圓痢甘草湯上白痢乾薑湯下水瀉井花水並空心服忌腥臊臊下有熱毒生冷四字治大便祕結大黑腰棗三個上將棗子擘開去核水銀粉於棗核孔中塞滿濕紙里煨用生蔥茶清嚼下治大人婦人膈上虛發肺腑痰壅調三焦開胃口大小便祕結不通及腸風等疾並皆治之麻仁八錢重技麻仁上闕他藥上為末除出麻仁研為膏次入前藥煉蜜為圓如梧桐子大每服二十圓空心茶酒任下治大便祕結搜風寬腸青皮去白威零仙去頭洗各二兩大黃一兩半大戟一兩牛蒡子四兩新瓦上炒上為末每服一錢人實壯每服三錢蜜酒調下服畢漱口治肺臟風毒熱壅鼻塞口乾大便祕枳殼一兩麩炒去穰川朴硝一兩川大黃同牛蒡子半兩炒芎藭二分郁李仁一兩半去皮上為末每服一大錢蜜水調下忌一切熱物等物治大小便不能行滯氣五宣散瞿麥木通甘草虎杖滑石各等分上㕮咀每服二大錢水一盞燈心數莖煎至七分臨臣臥時溫服治大小例祕經日欲死者推車七個車下有客字道按推車客蜣螂一名土狗同如同子病推車客用頭土狗用身如女人病土狗用頭推車客用身上新瓦上焙乾為末只一服用虎目樹皮虎目樹椿一名向南者濃煎汁調服經驗如神治赤白痢罌粟湯一貼局中者加白朮半兩上將白朮分作二分罌粟湯全貼只作一服煎入白朮一半服畢再將滓加白朮一半甘草三寸木爪三枚同煎又服立效極妙痢藥石榴皮陳皮甘草川當歸罌粟各半兩上將上件五味㕮咀用水十盞煎取三盞次用下藥茯苓七錢重粉重同北棗子七個上為末將煎藥汁此三味再煎五七沸去滓人心溫服甚者不過兩劑小可痢則一劑效治痢應圓黃丹三錢重巴豆四十九粒去油上二味研為末黃蠟深開入藥調勻候冷取出安瓦合子盛要用時旋圓如録豆大每服四五圓赤痢甘草湯下白痢乾薑湯下赤白痢相雜乾薑甘草同煎湯下可加烏梅同煎水瀉米湯下瘧疾桃葉七片揉水面北五更初下發日服救命延年治丈夫婦人一切重痢黃連六兩乾薑當歸川者阿膠各三兩上三件為末用米醋煮阿膠今消盡須用則料得醋恰好不可剩將藥末搜醋圓如梧桐子大每服三十圓飯飲吞下甚妙如神痢方中之魁也治痢疾黃連巴豆去殼各三兩上二味和炒赤色各研為末以録豆打糊為圓如大作記認二處安頓巴豆末作一處圓黃連末別作圓白痢黃連圓二十粒米湯米泔下赤痢巴豆豆下有圓子二十粒用井花水下治婦人胎前産後赤白痢生薑年少者百錢重年老者二百錢重時自然汁鴨子一雙打碎入薑汁內攪勻時作取雙作只上二味煎至八分入蒲黃三錢重煎五七沸溫湯空心服立效此二方授於撫州章道人道按鴨子即野鴨卵俗名阿比留多方古
