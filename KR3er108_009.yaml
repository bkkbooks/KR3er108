body:
  text: 卷九治諸腸風酒痢等疾治腸風瀉血牽牛五兩牙皂三兩不蛀者上二味水浸三日後除皂角將酒一升煮今干焙為末煉蜜圓如此大每服七圓空心溫酒下空心日午夜臥各一服或轉下黃物不妨病可後常每日服五圓飯食送下又方皂角樹上道按字蕈通音上新瓦上焙乾為末每服一錢溫灑下治丈夫瀉血婦人血崩漬人大腸出血豆蔻檳榔各炒紫色罌粟殼燒灰上三味等分不拘多少為末每服二錢飯飲調下空心服治腸風下血核桃殼繭退皮鞋底赤雞冠花各等分上四味燒灰為末每服一錢溫酒調空心下治腸風小赤豆一升上一味瓦上炒今黑色為末每服三錢粥飲調下日三服各飯前服又方瓜蔞三個上一味燒灰留性為末每服三錢米湯調空心下又方蕨菜花道按蕨菜花即蕨菜嫩芽也上不以多少文武火焙乾為末每服三錢飯飲下又方金星草三兩陳乾薑同上為細末每服一錢新汲水調下空心治腸風綿瓜不拘多少一名蠻瓜一名天羅又名天絲瓜其實皆綿瓜也道按綿瓜即絲瓜上一味燒灰存性性下一在溫字灑調二錢空心下治腸風並脫肛及有血蛇床子不拘多少上一味炒為末去大腸脫垂處貼立收妙甚治腸風及脫肛不收有血下不蛀皂角五莖上一味搥碎水一碗揉今皂角消盡絹二重濾過取十分清汁將脫肛腸浸在藥水中其腸自收不用手蕩如大道按大下脫腸字收了更用湯湯其腰肛上今皂角氣氣行則不再作三次湯治腸風五倍子白礬各半兩是這末順流水圓如梧桐子每服七圓空心飯飲下忌酒治腸風臟毒丈夫婦人皆治大蒜二頭紙里熟研成膏淡豆鼓二合水潤去皮研成膏上為加圓每服二十圓米飲送下空心上字下有同字治腸風臟毒酒痢下血黃連生薑上二味煎湯下二氣再次服五塊圓圓方於後再字作丹字五塊圓五倍子塊花麝者白藥好者各等分上焙乾為末酒糊為圓如此大每服二十圓空心米湯下日三服又方川當歸枳殼側柏葉麝槐子芍藥百草霜霜下有各一兩三字上銼同一處炒今煙微起末之每服二錢空心溫酒調下日午湯調下各飯前服甚妙治諸寸白蟲等患取寸白蟲錫灰木龜各一兩盧薈二十文黃丹輕粉各干文上為末豬膏油圓如大先齊一日晚莫吃飲次早五更濕水吞下分作二服又方錫灰十文上為細末用棗肉為圓如梧桐子大隻作一服先齊一日次日五更更字下有先字吃燒炙豬肉一枚次用溫水送下又方用生芥葉細杵井花水解取汁一盞五更初先吃炙豬肉一片次服芥汁巳時下了取寸白蟲芫荑十文雞心檳榔二個榔芽草半兩道按榔芽草即狼牙也雷丸三文輕粉少許上為末每服二大錢四更時茶清調下隔夜點取茶四更時取清摧取寸白蟲方巴豆七粒去殼出油皂角去皮取末一錢上用京墨磨醋糊為圓如此大隻作二服五更初橘皮湯下取寸白早方苦綿瓜子一以多少上研為末每服二錢好酒半盞空心調服取寸白蟲方書粉道按書粉即白惡土也蜜陀僧各等分上為末每服二錢用麻油調服空心下頃刻成涎取下又方定粉道按定粉即錫粉上細研每服一錢生麻油調五更服晚取下治婦人諸疾治婦人血脈不調往來寒熱狀似勞倦川當歸川芎甘草黃耆桂去精粗皮各一兩熟地黃一兩半白朮半兩白芍藥二兩柴胡半兩阿膠半兩上為細末每服五錢棗子一枚水一盞半煎空心溫服白湯點服亦得常服不生帶下調血脈養子宮終身無病治婦人衝任處損月候不勻或來多不斷時復淋瀝或過月不來或房中去血過多又治損娠小腹急痛發熱下痢手心煩熱又治久無子息並宜服之吳茱萸三兩去閉目者沸洗淨三次川當歸半夏各二兩半制阿膠炒甘草炙各二兩上為銼散每服三錢水一盞半生薑五片煎至八分去滓熱服空心食前治婦人赤白帶下龍骨半兩舶上硫黃三錢上為末每服半錢無灰舊酒空心調服三服不問遠年日近盡今痊效
