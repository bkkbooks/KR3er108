body:
  text: 卷四治諸口舌牙齒患治上膈熱極口舌生瘡膩粉一分匕杏仁七粒不去皮尖上二味臨睡時細嚼今涎出則吐之用溫湯漱口未全可久合用又方膽礬一塊子上用百沸湯泡開含漱一夕可瘥八分又方五倍子不拘多少上為末糝在中瘡上後用茶清灌漱立止治中舌生瘡甘草五文白礬十文上為末含化咽喉痛亦治之治滿口生瘡此因虛壅上攻口舌生瘡草烏一個南星一個生薑一塊治口鼻生瘡上好生薑一塊臨睡時細嚼含睡不得開口生氣眠著不妨睡覺治一切牙疼川升麻當歸川鬱金細辛各等分萆撥白芷荊芥已上比前藥三分之二各等分上七味為細末用瓦合子貯之緊閉合口每用少許揩在患牙痛處溫荊芥湯灌漱立效甚者只二次取牙痛今落不犯手腳草烏十五文畢撥同川椒三十文細辛同上為細末每用少許揩在患牙裡外不過三五次揩其牙自落又方定牙痛上用三腳牙不拘多少鹽泥固濟火煅通紅出火毒次碾為末每用些少頓蛀牙孔內立效臨用藥時入乳香少許今勻同用若先將乳香交和之後恐過即即當作卻藥性其效較緩是故用臨和勻治牙疼雄黃沒藥等分乳香少許上為末若左邊牙疼用藥搐左鼻孔次將藥吹入左耳右邊牙疼則搐右鼻孔及吹入右耳無不效驗治牙齒動搖搖下有髭烏牙牢妙生薑半斤生地黃一斤各洗今淨研取自然汗滓留取上不蛀皂角十莖括去黑皮並節將前藥汁蘸皂角漫火炙今黃用藥汁盡為度並前藥滓同入磁罐內用火煅留性為末牙齒動搖用藥揩牙齦上髭黃用鐵器盛藥末三錢湯調過二日將藥汁蘸鬚臨睡時用次早已黑三夜三次用之其黑如漆妙甚此方乃得自閻知府宅貴宦常用屢有效驗治牙疼鶴蝨細辛白芷甘茄各等分道按甘茄即尋常茄子也上件為末每用少許揩痛處如有蚟孔用飯圓藥末塞入孔中立效取蛀牙本分法磠砂三錢匕硃砂一錢鵬砂成塊一錢匕蟾酴七個已上同為末上和勻五月五日合者佳點藥於牙根上良久用手指揩下閃用後傳藥防風五文荊芥同乳香十五文上為末揩牙落處並用些子塞牙落孔子此三方余見一道人貨藥取牙一日常貨三兩貫錢余厚賂之始傳得妙治蛀牙疼上川烏大者一箇舊糟內藏著候一月日透內後出切焙乾入細辛同為末揩痛處效又方川烏草烏各一個白附子半兩附子臍三七個硃砂少許別研上為末和勻每服二錢酒水各半盞同煎至七分候冷服臨臥時不得再吃熱物治一切牙疼風齦常出鮮血漸至崩落口臭不可近人者並皆治之大黃米泔浸生地黃上二味旋切各用一片二片合定貼所患牙上一夜即愈未全可則如前法再用如說話恐引風要津液清痛處治牙痛川烏阿魏硃砂各等分上將阿魏醋浸入蒸餅搜作糰子切片焙乾同三味為末付牙齦上不可漱口良久或咽下去亦不妨藥清盡又使其效如神治牙疼土駒一個道按土駒當作土狗考本草螻蛞一名土駒上一味用舊糟里定次將紙里浸火內煨今焦去糟只將土駒為末付牙疼處立效治牙崩信砒紅丹右先將砒霜頓在鐵香匙上卻以紅丹蓋定文武火上煅今煙盡為度研為細末先用枳殼荊芥湯灌漱吐去將前藥末揩牙上不可吞直候涎多吐下又須用前湯灌漱立效治諸眼目等患治諸眼疾因熱病後毒氣攻皮生醫膜遮障服此藥後遂旋消退不犯針刀青箱子防風枳殼已上各一兩茺蔚子細辛各半兩枸杞澤瀉生乾地黃石決明各一兩半黃連半兩川當歸二兩車前子麥門冬二兩上各如法修事焙乾為末煉蜜圓如梧桐子大每服三十圓飯飲吞下忌一切毒物又方治因五臟熱毒壅盛氣攻兩眼赤腫疼痛或生醫膜怕日羞明迎風滴淚並皆治之黃芩大黃石膏羌活各一兩蛇蛻一條上為叢銼散每服半兩朴硝少許通草二寸水一大碗同煎至六分臨睡溫服瀉一兩行不妨次將溫粥補自後每服只三錢重不用朴硝水煎服忌熱物及不得啼器使怒又方防風白蒺藜各一兩羌活一兩半甘菊三兩上為細末每服二錢鹽少許百沸湯點食後服又方治腎經虛冷不候不升不能上蔭肝木致今眼目昏暗或赤腫痛癢須用此藥方能治川芎荊芥天麻川烏烏藥羌活黑牽牛川當歸金叉石斛已上各等分上為細末煉蜜圓如豆大硃砂為衣每服一圓薄荷茶嚼下治丈夫婦人室女小兒諸般赤眼針頭圓川烏尖七個懷干白殭蠶七個鵬砂十文上為末用豬膽取汁調藥不今稀用成軟塊攤在碗內荊芥艾各一兩皂角一莖燒煙將藥碗高覆薰之常將藥膏攪轉又攤又薰皂角荊芥在盡為度再搜成塊油單里定入地中出火毒冬天兩日夏天一日夜春秋一夜取出圓如針頭大每服一圓入皮中妙治眼疾穿針散本賊半兩去黑不要塵者香附子細辛菊花羌花各半兩上為細末每服二錢用好茶少許同點食後服治清盲眼法上今患人至黃昏時尋兒宿處驚今飛起即念咒咒曰紫公紫公我還汝盲汝還我明如此三日自可此法雖傳得後不曾試尚恐有妄治眼生醫膜及內外障烏賊魚骨一名海螵蛸生節腦少許上二味碾今極細銅筋點熱湯洗銅筋三五次點立效又方治眼目赤腫或癢或痛上膈壅熱而成大黃苦葶藶各一兩上焙乾為末煉蜜圓如龍眼核大每服一圓至二圓用山梔子仁湯嚼下量大小加減與之又方解熱眼大黃甘草當歸赤芍藥上為細末每服二錢湯調下食後服或以一錢末湯洗尤妙治暑月或行路目昏澀多眵黏者生龜龜當作龍腦薄荷五七葉手揉爛上用生絹烈汁滴入眼中妙治眼洗肝散此與別方不同錢大黃甘草各半兩菊花人參各一兩上為細末每服一錢熟不調下各用忌毒治久宣連去毛黃柏秦皮上三味等分為末每服一錢水一盞煎五七沸煎五七沸用夾絹濾去滓承熱湯洗候藥冷住再暖又洗滓又並煎洗治氣毒赤腫熱痛眼好真運半兩生龍腦自然汁半盞上二味煎取一盞點洗這飽食後服一呷須用人實壯可服虛薄者不可服洗眼明睛散馬牙硝一兩青礬少許上二味研勻用水調文武火煎乾出火毒一宿次用蔓荊子防風二味為極細末各三錢重入前二味同拌勻每服一字用百沸湯泡洗治風毒眼何首烏荊芥甘草各等分上為細末用砂糖為圓如彈子大每服一圓食後薄荷茶嚼下治眼慕慕當作暴赤澀腫疼痛木賊半兩細辛半兩草烏一兩龍腦半兩上銼每服三大錢水一大盞黑豆半合煎至一兩沸入沙溏一塊如大彈大煎至八分去滓食後溫服忌毒煎煿油煿點醬熱物及不得嗔怒房色等事則使易獲痊安治赤腫眼右以白薑末水調貼腳掌心又以土原朱蜜調睡貼眼上又方治睛疼難忍者川當歸防風細辛薄荷各等分上為細末每服二錢麥門冬熟水調下食後日午夜臥各一服又方白芷赤芍防風細辛各等分上為末每服三錢水一盞砂糖二錢同煎七分去滓溫服不拘時候治久年眼生黑花不忍者椒目一兩炒蒼朮二兩炒上件為末醋糊為圓如梧桐子大每服二十圓醋茶送下不過十日取效點眼水膏鵝梨道按鵝梨即梨肥大者一個鷹爪黃連半兩上用砂瓶一雙先入梨次入黃連末候初第一次下雪時取雪滿入砂瓶內油單封口入地五寸深候立春日交春時候過了取出點眼或溫過洗妙治眼目諸疾點眼膏子羊膽一個上一味入蜜一錢在膽內線札定坩鍋內滿入水煮熟冷水內浸取出候乾頓入角罐內竹筋點眼四角立效神驗點醫藥照水丹硃砂半兩海螵蛸一錢上二味乳鉢內細碾水飛過澄取又用黃蠟少許溶旋入藥待要用時就火旋圓如蘿蔔子大臨睡時用一圓點入眼角緊閣眼睡著次日用溫湯洗下未全退者更用一服極炒用此藥後或更以所吃藥與之尤妙明醫者自能斟酌但眼患比他疾不同治男子婦人血灌瞳人及睛疾生乾地黃大黃各一兩朴硝一兩沒藥半兩上為細末每服一錢熟水調下治到睫爛眩蜜一兩虢丹五錢重上二味漫火熬成膏入輕粉五文今熬黑色逐時泡沫點之點冷淚眼二霜膏南鵬砂一錢蕤仁十四粒出油姜霜末半錢腦子少許上乳鉢為細末用糖半兩研勻為膏銅筋點之立效治諸般眼患菊睛圓甘菊花川芎一兩甘草一兩天門冬四兩上為細末煉蜜為圓如大每服十五圓至二十圓熟水吞下日三服余寓衡陽日有一婦人患眼十年餘與此藥十服瘥
