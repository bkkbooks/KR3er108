body:
  text: 卷十治小兒諸疾治小兒十種丹瘤腫毒所起形候並方法一飛燥丹從頂頭起腫光用蔥白研取自然汁塗二吉燥丹從頭上紅腫痛用赤小豆末雞子清調塗三鬼大丹從面起赤腫大作火用燥心土雞子清調塗四天火丹從背起赤黑用桑白皮末羊脂調塗五天燥丹從兩臂赤腫黃色用柳木燒灰水調塗六水丹從兩肋腫用生鐵為末楮糞調塗七胡次丹從臍上起黃腫用檳榔為末醋調塗八野火丹從兩腳赤腫用乳香末羊脂調塗降九煙火丹從兩腳有赤白點用豬槽下土麻油調塗十胡漏庭土羊脂調塗上此十種丹毒變易非輕治之或緩能終不救余不惜此方能逐一仔細辨認依此方法治之萬不失一如經三日又愈病入臟腑則終不可救不可緩也又愈二字當作不治病字作攻字治小兒急慢驚風四肢逆冷眼張口噤涎不止保命丹虎睛一個將瓦上安之以豆蓋定漫火逼干箭頭硃砂半兩蜈蚣二條去頭尾赤腳者麝半錢全蠍半錢天麻一分上為細末煉蜜為圓如此大瓦罐貯之又入腦麝香窨定急驚風薄葆蜜湯化下慢驚風薄荷湯化下各三圓更量兒大小加減與之些少驚悸亦可服之按慢驚屬虛證與急驚未可同治又方赤腳蜈蚣一條去頭尾蠍稍草烏尖七個半夏三個上焙乾為末入麝得三十文輕粉半錢七用生薑自然汁圓如此大每服三圓金銀薄荷湯化下次用生硃砂調塗病兒腳中心妙治小兒毒氣攻腮腫赤可畏者皂角二兩去根道按根當作核天南星二錢生用糯米一合為末上為細末薑調塗立效治小兒驚風茯苓甘草硃砂青黛膩粉上各等分入麝香少許每服一錢蜜水調下治小兒驚熱蠍七個天南星取心為末一錢人參蛇蛻各三錢重上為末薄荷蜜湯調下治小兒風毒白牽牛一兩半炒大黃三錢青皮甘草朴硝各一錢重上為末每服一錢砂糖水調下治小兒遍身浮腫方黑牽牛三兩炒青木香青皮防風檳榔各一兩上為末麵糊為圓如芥菜子大每服二十圓桑白皮湯下消毒順氣飲人參茯苓甘草升麻各等分上為細末每服半錢生薑一片棗子半盞煎至一大呷許溫服不計時候治小兒吐瀉不止龍骨火燒留性滑石定粉各等分道按定粉即錫粉治小兒癇疾天南星上一味炮烈出火毒去黑皮不拘多少為末每服半錢生薑薄荷蜜酒調下治小兒疳積黃瘦吐食川烏一錢定粉三錢芥灰二錢龍骨同上上為末滴水為圓龍眼核大作餅子每服一餅飯飲磨下治小兒疳積祕方盧薈圓上精細事治炮製為末麵糊為圓如大粟米大兒一歲以下一圓或二圓亦不妨自加減與之治小兒顛癇欲發眼暗瘛瘲聲惡嚼舌雌黃圓雌黃黃丹各一兩少炒麝香一錢研上為末拌今極勻用牛乳汁半熬成膏入前件藥末杵三五百下圓如録豆大每服三圓溫熱水下一日三服此方得自於明醫之家後余嘗傳與一貧醫因是藥醫道大行治小兒驚風積熱全蠍七個去毒蟬退二十個甘草天南星大者一枚炮今香上為末每服半錢水半盞薄荷七小葉煎至七分溫服治小兒驚熱寒水石二兩甘草一兩馬牙硝四兩重硃砂一分上件為末今極細次入腦麝各三十文煉蜜搜和圓如龍眼核大用瓦罐盛之每服一圓或半圓量或半圓量兒大小強弱與之薄荷湯候冷調下治小兒哮喘黃丹砒霜上各生用為末用棗肉為圓如麻子大每服三圓臨睡冷茶清下治小兒赤熱腫脹川大黃白礬上二味等分為末用冷水調作奄子貼眼上立效治諸雜病等方治肉鯁白茯苓上一味臨時細切研為末以所鯁骨煎湯調下治果報面生瘤方上用艾圓灸十粒即用醋磨雄黃塗上剪如螺螄奄子大貼所灸處更用膏藥重貼二日一換候癢擠出膿如録豆粉即愈治盜汗葳零仙甘草各半兩上為末每服三錢溫酒調下治盜汗處腎濕人參一錢苦參三錢重龍牙草同上道按龍牙草綱目馬鞭草下出之俗云金水引草麻黃根同上上件為末煉蜜元如此大用時早朝使椒湯洗手了麻油塗手掌口握藥一粒移時便瀉止即以冷水洗手宣積藥巴豆一百粒去殼水洗四十九次五零脂白薑赤茯苓茯苓下有各一兩三字上為末用醋糊圓如録豆大每服五圓冷茶清五更初服或欲瀉止冷水洗手面腳三處立佳
