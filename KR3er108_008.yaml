body:
  text: 卷八治諸打撲傷損等疾治打撲傷損川烏草烏各一兩上為末用生薑汁調作掩子貼損處又綿縛定治打損接骨方接骨木半兩乃蒴擢是好乳香半錢赤芍藥川當歸川芎自然銅各一兩上件為末用黃蠟四兩深入前藥末攪勻候溫軟衆手圓如大龍眼如打傷筋骨及閃抐著疼痛不甚忍者用藥一圓好舊無灰熱酒一盞浸藥候藥漬失開承熱呷之痛絶便止若大假傷損碎折先整了骨用前藥貼瞭然後服此藥表裡兩次無不效者此二方是一副不可分開余得之費數十緡今不敢祕治打撲傷損草烏五兩沒藥三錢自然銅半兩青皮二兩苦丁香十個甜瓜蒂是上為末每服二錢用溫無灰酒調吃黑水牛肉蘿蔔只得使鹽此二物之外並皆忌之不得吃治打撲傷損定痛掩木瓜術蜜陀僧等分上為末入麵少許調作糊貼痛處又方草烏白殭蠶蒼朮各等分上為末薑汁調貼痛處治打撲肉損筋骨疼痛沒藥乳香芍藥川椒去子及閉目者川芎當歸各半兩自然銅三錢半炭火燒上為細末用黃蠟二兩深開入藥末不住手攪勻溫圓如彈子大每服一圓用好酒煎開消盡乘熱一服吃盡看那處痛向痛處臥霎時服三五圓立效治打撲傷損生葛根上一味搗爛用米醋調開攤痛處綿縛定又方上野柳樹根細杵用米醋調開攤痛處古甘橘葉白酒糟杵細縛痛處或大假痛用火燒今用紅醋並米泔潑地上急鋪薦患人去薦上臥蒸出汗內則服藥外則掩則易安治打撲傷損筋骨上夜合樹皮四兩炒乾末之入麝香乳香各一錢重每服三大錢溫酒調不飢不飽時服治刀箭傷血出不止併骨折檳榔一個木香胡黃連各三錢重上為末傳瘡口上血止又接得骨治筋骨諸疾手足不遂行動不得遍身風瘡左經圓草烏白者去皮臍木龜子白膠香五零脂各三兩半川當歸班貓百個去羽足醋煮上為末用黑豆去皮生杵取粉一斤醋糊共搜杵為圓如雞頭大每服一圓溫酒磨下筋骨疾但未曾針傷炙損者三五服立效此藥曾醫一人軟風不能行不十日立效專治心腎肝三經通小便除淋瀝通榮衛滑經絡此方傳自淨因寺聖僧處得之大有奇效治打撲傷損腫痛傷風天南星半夏地龍各等分上為末用一薑薄荷汁調貼痛處治諸寒瘧等疾沼脾胃有積久不克化或元有上證遂成寒瘧之疾或選寒後熱或先熱後寒或但熱不寒或但寒或但寒不熱或疼譫語除傷寒之外是瘧疾者皆治之人參木香官桂白朮茯苓黃連附子柴胡黃蓍厚朴甘草麻黃各三錢重肉豆蔻十個檳榔五個上㕮咀每服三大錢水一盞生薑三片烏梅一個同煎至七分入酒少許又煎三五沸溫服此藥兼治盧弱之又方白薑良薑半炒半生各半兩上為末每服二錢豬腎酒調下治久患勞瘧柴胡恆山各一兩秦艽甘草各半兩上㕮咀每服五大錢酒水各一小盞童子小便半盞同煎至五分當發日五更初面北痞川烏大者二個生去皮臍上為末每服一大錢水一碗棗七個煎至七分五更時冷服又方粉霜硃砂各一錢重録豆粉七錢重上件為末糊為圓如此大每服一圓冷水五更初下忌生冷物減瘧丹螺青硫黃官桂白礬巴豆去油各等分上件藥取五月五日為末面南用粽子角為圓如梧桐子大每服一圓用新綿里男左女右耳內安發日用之又方良薑白薑各等分上二味火上煅留性為末每服三錢雄豬膽一個水一盞溫和膽汁調下立效治寒瘧勞瘧方龜甲不拘多少上一味醋炙今黃為末每服二錢溫酒調下空心食前及臨臥時各一服治瘧疾力大蒜一個分開四方上每一片內入巴豆肉一粒濕紙里煅熟去巴豆研入黃丹為圓如難頭大每服一圓先發寒用桃枝七寸東向者煎湯發日五更向北服如先發熱用冷水送下未全安次發又可進一服即除根
