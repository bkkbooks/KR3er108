body:
  text: 卷五治諸喘嗽等患治遠年日近喘嗽皂角不蛀者三大莖上一味刮去黑皮刀切開去子每子倉內入巴豆肉一粒合就麻皮縛定用生薑自然汁和蜜塗今周匝漫火炙又塗又灸以焦黃為度擘開去巴豆不用以好明礬一兩枯過萆麻七個薑汁和蜜塗炙前三味為末卻以杏仁二兩去皮尖研成膏卻與前藥和勻每服一錢用梯梯當作杮子干炙過候冷點藥細嚼臨睡服忌熟毒魚鮓鮭鯗油麵酒米醋煎煿熟毒等物治十六般哮嗽黃明膠二兩銼炙馬兜鈴甘草炙半夏薑汁浸三日杏仁去皮尖已上各一兩人參半兩上為末每服一大錢水一盞隨病有湯使煎至七分臨睡食後服湯使於後心嗽面赤或汗流加乾葛煎服早吃晚飯肝嗽眼中淚出入烏梅一個糯米三三當作十四粒煎服脾嗽不思飲食或一兩時噁心入生薑三片煎胃嗽吐逆吐酸水入蚌粉煎膽嗽咳今人臨睡用藥半錢茶清調下肺嗽入秦艽末同煎冷嗽天曉嗽甚蔥白三寸同煎血嗽連頓不住當歸末棗子同煎暴嗽涕唾稠入烏梅生薑煎產嗽背甲疼痛甘草三寸同煎氣嗽肚痛脹滿入青皮去白同煎熱嗽夜甚蜜一匕蔥白同煎哮嗽聲如移鋸入半夏二個同煎腎嗽時復三兩聲入黃耆白飴糖煎上件十六般嗽疾依法煎服無不效驗此方乃都下一家專貨此藥活十餘口余因中官厚賂錢物方始傳得屢試有驗治遠年日近哮嗽妙方砒一錢麵一錢海螵蛸一錢上三味為末水調作餅子漫火炙黃再研今細每服一字用井花水調一大呷空心服良久吐出為度小兒加減與之忌食毒物治魚哮古老錢七個白梅肉七個上水一大盞兩宿每服一茶腳許空心服良久吐惡物治膈上有痰川芎圓川芎二兩細銼漫火熬熟川大黃二兩蒸今極熟上件焙乾為末用不蛀皂角五七挺盡絹濾去滓瓦器中熬成膏和前二味為圓如錄豆大每服十五圓生薑湯下小兒三圓補肺法地黃二斤生淨洗生薑四兩杏仁二兩蜜四兩上搗如泥瓦合盛飯上蒸五七度每日更挑三匙嚥下治氣喘咳嗽大黃半兩葶藶子一兩淨洗瓦上炒上為末煉蜜圓如梧桐子大每服五七圓用桑白皮湯下又方草烏五錢重麻黃三錢重上為末每服三大錢蘿蔔一個同煮今熟只吃蘿蔔妙又方天南星二個大者蚌粉甘草等分上為細末每服一錢水一盞姜三片姜至七分臨臥溫服治暴嗽白礬一兩細研砒霜一錢上為細末砒霜安放茶盞底卻將礬末鋪蓋火煅為末烏梅肉圓如錄豆大硃砂為衣每服二圓紫蘇湯下治久年日近喘嗽蟬腿一兩去頭足五零脂半兩生蚍半兩生用馬兜鈐一兩生上件除出輕粉研為末用生薑荸齊自然汁合粉藥圓如大每服一圓臨臥細嚼生薑湯下送下忌毒定喘天南星半夏青皮炒今黃白礬炒各等分上為末每服一錢好北棗去核入藥在內細嚼嚥下治諸般嗽甘草十三文滑石葛根桂枝桂花各十文瓜姜一個和皮子使山藥二兩蚌粉黑色者苦參各五文上為末每服二錢姜五片棗子三枚水一大盞入蜜同煎至八方服治勞嗽青黛三錢辰砂一分雌黃雄黃白礬信砒各一錢並生用上併為末淡豆豉一百粒湯浸去殼研如膏入前六味圓如梧桐子大每服一粒臨睡冷茶清下化痰涎方明礬一兩枯過白殭蠶半兩去頭腳絲上為末研生薄荷今爛和圓如錄豆大每服二十圓薄荷湯下日三服治嗽不蛀皂角去黑皮乾薑板桂去粗皮各半個上為末煉蜜為圓如梧桐子大每服十五圓薑湯臨睡時下治諸般嗽疾天南星半夏各一兩各使薑汁浸一宿豬芽皂角去黑皮並子杏仁去皮尖麵炒黃青黛各半兩焰硝三錢巴豆二十一粒去殼生用上一處為末姜糊圓如錄豆大每服七圓臨臥薑湯下治諸瘰癧等患治諸瘰癧硃砂砒霜硇砂馬牙硝各等分上乳缽內研細麵糊搜如香附子狀相瘡口大小作之盡送人瘡口中若腫時用薄荷研細塗之待收口了卻將大柏皮並白丁香併為末盡入孔中如邊不幹卻用江子乃巴豆也去殼不拘多少上用麻油煎今赤火氣後去巴豆入蠟合如膏看瘡口大小塗之及將白芨末水調塗瘡上立效又方蜜陀僧十文青礬五文上二味為末干糝更用麵糊搜藥用奄貼之候瘡干更上藥三五次然後用白芨黃柏皮二味調作奄貼之無不效者治鼠癧瘰癧上一味研為末入水銀粉干傳又方田螺殼燒灰留性上一味為末傳之妙又方黃荊子又名蔓荊子乳香甘草各等分上為末每服一錢熱湯調食後良久服又方土附子一個洗鹽三升小便五升上三味同浸半月日取出將附子黑皮險干為末用黑豆爛煮研為膏圓附子末如梧桐子大每服七圓溫酒早晚下二服治漏癧蛇菰子不拘多少按蛇菰子未詳一作蛇床子上一味瓦上燥干為末用紙捻掿入瘡內立效治諸鼻耳等患取鼻痔巴豆十三個去殼陽起石一錢石連肉三十個上為末每用半字許搐入鼻內又用綿塊子蘸藥塞入鼻中其痔內化爛出了又方蠍稍一錢巴豆五粒去油丁香五粒白丁香七粒上為細末用螺青一字和勻用內消膏藥溶開入上件藥搜圓如龍眼核大用一圓安鼻內又方苦丁香乃苽蒂十四個赤小豆丁香各十四個治飛蟲入耳上用好酸米醋一味滴入耳內蟲必出不出即死曾有一人被焦蟲入耳其蟲口硬如鐵但身軟用此藥滴之立死而出治酒查鼻及婦人鼻上生黑刺者生硫黃十文輕粉同杏仁五文上為末用餅藥調臨臥時塗早則洗去治鼻不聞香臭多年者亦治生蔥一味上將蔥分作三段早用蔥白午用蔥管中截晚換蔥管末梢一截塞入鼻中今透里方得不二三日用之便聞香
