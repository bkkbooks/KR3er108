body:
  text: 卷七治諸痔疾並論五痔大凡五痔皆因虛憊恣食五辛五味雞魚而成熱毒壅入大腸津液不通氣血凝滯久坐久忍不糞水冷入河水洗酒後行房及暑月行路坐諸熱地又移坐冷種種能成斯病一者肛腸生肉腎痔鼠你可似櫻桃或似大豆時時出血又如出膿名曰鼠你痔二者肛邊大乳痛腫無膿血名曰酒痔飲酒便發三者肛邊努核疼痛難忍糞則有血或因憂愁思盧冷熱不調無時而發名曰氣痔或大便澀難氣結不通下血麵食少無味各曰勞痔四者大便後下諸膿血更加痛澀肛腸努出名曰脫肛痔五者氣攻兩腎臉大便不通糞血色下赤黑毒熱不消肛門濕癢一似蟲行五痔者因房室大勞多仿雞魚陳久之物即成斯疾也熏洗痔方枳殼不拘多少上為末每服二錢水一盞砂瓶內煎百沸先去瓶上坐熏後卻瀉出通手熱洗妙治痔下腫痛枳殼一兩陳粟同炒今黃赤粟不用青木香一分上為末每服二錢飯飲調下治痔漏瘡方雞子一雙煮熟去黃取白切焙白礬明者如皂角子大匙上焙過用三兩上為末先用溫湯淨拭乾用紙捻點藥送人瘡孔內立效一日三易治痔方信砒一兩煅今煙盡穀精草三錢白礬一兩硇砂三錢上為細末綿塊點藥撲上如痔干可用調傳治因痔疾陰礙大便秘結牽牛青皮威零仙大戟大黃上為末量人大小每服一錢二錢至三錢用蜜酒調下須用冷熟水漱口治男子婦人諸般痔漏黃牛角狠毒等分上為末糞花漏每服一錢甘草湯下合官司漏酸醋調一錢滴珠漏山梔子三個煎湯下半錢勞漏薑湯調下半錢腸內米飲下一錢治痔神香道按神香即香木類返魂香一名明礬燒灰多燒則有灰上一味燒苦竹瀝調傳治痔諸痛大蜈蚣白礬二味為末用棗肉圓分作二圓燒煙用竹筒透引煙燻痔妙治腸風痔漏赤芍藥官桂甘草炙已上等分上㕮咀每服二錢生薑二片白礬一塊水一盞同煎至七分去滓空心服又方雞冠花不拘多少上一味濃煎湯每服一盞空心下治痔漏此因大腸感風熱而生生砒一字水銀一粒如米大膩粉一字真麝一粒如小豆大上件併入乳缽內左今極細如痔或有珠子者將白礬湯淨洗拭乾用手捻藥揩在痔肉上揩得癢時便是藥行一日二次用又洗去五日後住藥見效如咸有孔即用紙捻子引藥送入今知徹其內更用紙塞孔前一日兩次使藥自能生合上為末蒸餅為圓如錄豆大每服空心枳殼湯下一圓不過十日取效理痔方五零脂四錢膩粉半兩麝香三十文上研為末先用甘草湯洗後用津唾調抹痔上痔濕則干撲熏痔方官桂五錢蛇床子半兩蛇蛻一條上為末每用一錢湯煎熏洗傳痔方斑貓十個輕粉半錢馬牙硝三十文好紅椒一錢黃皮半錢道按黃皮即陳皮上為末先用皂角荊芥洗今淨拭乾用麻油藥傳收痔方白斂白芨各一兩黃皮二兩上為末入輕粉麝香各少許麻油調傳立收了此藥不能去根但緩急展限而已治腸風痔漏鯽魚一個上將魚破開去盡腸入白礬今滿瓦上燒過併為細末用雞毛捲藥傳之立效治腸風痔漏大黃當歸川者苦參牙皂去皮上等分為末醋糊圓如梧桐子大每服二十圓空心溫酒下治痔疾腸風半夏湯泡洗七次黃蓍枳殼去穰上為細末薑汁糊圓如此大每服三十圓溫酒空心下治痔漏下血不止及收痔城市河中水上一根水脫衣坐水中頻洗即止痔亦可不過三五次立效治諸痔疾塗杉即杉木塗土被埋者朴硝大黃側柏各等分上㕮咀瓦罐內煎二十沸安身於罐上坐黨其痔疾堪手下則洗之效又方枳殼甘草香附子炒去毛上各等分為細末每服二錢米泔調下甚妙此方乃吳知府宅方治腸風痔漏穿山甲一兩火煅焦煙麝香一錢上為末每服一錢空心飯湯下熏痔方鼠痔方鼠朗度道按鼠郎和名伊多知上一味瓶內燒煙坐身於瓶口熏三五次除根又方上用降真香燒煙燻妙
