body:
  text: 卷三治諸氣冷等疾治一切氣疾丈夫婦人撞心冷氣並治之香附子一斤炒陳皮四兩甘草一兩上為末每服二錢空心鹽湯點服治婦人血氣刺痛大小腹痛並血脈不調走疰疼痛並治之川當歸白芍藥各二兩香附子半斤山慈姑三兩熟地黃二兩甘草一兩上㕮咀每服三錢水一盞烏梅一個荊芥少許同煎至七分溫空心服如腹中冷痛不止者加阿膠二片同煎立效治婦人室女血氣刺痛不可忍夜呌喚可憐者一服見效支臺子肉桂良薑沒藥各等分上干焙為末每服二錢乳香酒調下熱服不拘時候和氣散治丈夫婦人一切氣疾他一瘳者甘草炙半兩白芨一兩地骨皮一兩藿香半兩山蜈蚣一兩白芷一兩紅內消半兩木香半兩山慈姑一兩紅內消即何首烏右焙為末每服二大錢空心鹽湯點服余鄉曲有一老醫數世習醫凡婦人氣疾唯憑此藥百發百中家有十口只以此藥養家治小腸氣痛不可忍者烏藥搗研好舊酒浸一宿高良薑茴香舶上者三味各一兩青此二兩上為末每服二錢遇發時熱酒調下又方杏仁一兩蔥白和棖搗焙乾半兩舶上茴香一兩上為末每服三大錢空心溫胡桃酒調下治膀胱氣青礬一兩白礬一兩上用小瓦罐子一雙入藥於罐內用單板機皮縛緊鹽泥如法堅牢固濟炭五斤煅今通紅盡炭為度取出入地穴內去火毒二宿為末醋糊為圓如録豆大每服十圓空心鹽湯下或白湯亦好治疝氣官桂半兩蛇床子一兩半柴胡細辛白芷各二兩右㕮咀每服五大錢水二升蔥白和鬚二莖椒五十粒同煎至七分於瓶口上薰合微汗出再曖通手洗婦人帶下赤白薰之亦效婦人用可加紫蘇一握又方大蒜三個韭菜一握鮮菜一握道按鮮菜即生菜用菘葉右用大砂瓶內煎今百沸乘熱薰之候入得手則洗之如冷則再暖日三次立效治痰氣立效散川芎川楝子青皮舶上茴香桃仁黑牽牛已上各一兩焙上焙乾為細末每服二錢無灰酒一盞煎至八分盞溫服灸法治腎氣外腎腫小腸氣痛腹內虛鳴灸風市穴五七壯灸氣海穴七壯灸臍左右各去一寸兩穴各七壯上豫曾患此疾灸之立效後來不發甚妙治液氣夜明砂不拘多少為末上用豉汁調塗立效又方銅青米醋調成膏上先淨洗腋下用輕粉摻過卻使上件膏塗之立效又方膩粉明礬紅丹各等分上為末臨睡時抹之佳可使半月日去根治小腸寒方枳殼一兩舶上茴香一兩上為末每服三錢臨發時空心熱酒調下又方木香一兩天南星半兩良薑半兩與天南同用麩炒今赤白上為末每服二錢無灰酒一盞煎三兩沸空心服此二方曾醫生專修合貨賣供五口治小腸氣痛撞腹面青唇黑欲死者木香茵陳芫花甘遂各等分上件為末每服二錢水一盞煎至七分去滓溫服此藥後應犯甘草藥皆不得吃恐與甘遂相反故也其藥甚妙緣處方者有理屢有效驗又方川棟子茴香川烏炮破故紙各等分各妙今黃色上焙乾為末酒糊為圓如梧桐子大每服二十圓鹽湯溫酒任下忌生冷動氣一切毒物治遠年小腸氣衆醫不瘥者硫黃舶上茴香炒今黃不可犯銅鐵器各等分上為末每服五錢用熱酒調空心溫服永除根本治膀胱氣金蓮散巴豆一百粒川棟子二十四個湯浸去薄皮切作片子上二味用麩二升同炒今黃赤去麩與巴豆不用只將川棟子一味為末每服三錢溫酒調空心下余閲古今一切名方無如此方奇特效治諸腰痛等患治腰疼痛用轉下膿水黑牽牛白朮各一分桑白皮一兩木通半兩上為細末每服三錢茶清調下四更時服轉了粥補又方治久患腰痛石甜瓜一兩附子炮了半兩冬瓜皮半兩檳榔木香烏藥各半兩上為細末每服一大錢溫酒調下臨睡服此日只午後申時先吃了晚飯申時當後不得吃食專假時臥時服藥治腰腳筋骨疼軟無力酒浸牛膝圓牛膝三兩炙黃川椒半兩附子一人十錢重者炮去皮臍左㕮咀用生絹作袋子袋盛縫結其袋口用無灰酒一斗春秋浸十四日夏浸七日冬浸十日每日空心飲一大盞候飲盡酒後出藥為末醋糊為丸每服二十丸空心溫酒鹽任下忌動風等物治五般腰疼巴豆五個每個用濕紙里煨今熱去穀殼取肉去油只使半出油半微去油五零脂半兩炮黑牽牛瓦上炒白牽牛同各三錢重狗脊半兩萆薢三錢重沒藥三十文胡桃兩個取肉研為膏上件為末將前胡桃膏入醋糊為圓如梧桐子大每服十五圓風腰痛豆淋無灰酒下氣腰疼煨蔥白酒下敗精腰痛茴香酒下失血腰疼當歸酒下打撲腰疼蘇木酒下又方治五種腰疼狗脊萆薢免絲子各二兩酒浸焙乾別研上為細末煉蜜如此大每服三十圓用萆薢二兩浸酒三日取酒服藥空心食前服又方治遍身皆痛如勞證者傷寒身體疼者不可服但少年虛損冷憊老人諸疾並皆治之黃耆人參甘草附子炮羌活木香知母芍藥川芎前胡枳殼桔梗白朮當歸茯苓半夏各半兩柴胡鱉甲各一兩桂心酸棗仁各一分杏仁半兩上為末每服二錢水二盞薑三片棗子三枚烏梅三個蔥白三寸同煎至七異功散治婦人血冷氣痛心胸煩悶不思飲食四肢無力頭目昏疼寒熱往來狀似勞倦並皆治之牡丹芍藥白芷乾薑已上各三錢當歸陳皮官桂烏藥玄胡縈川芎苦梗已上各半兩為為末每服二錢生薑三片酒水各半盞煎至七分溫服初生時宜服此藥每日三服七日後漸減服數至十日滿永無疾病服後些少腹痛不妨事勿嘈治諸脾胃等疾開胃進食丁香湯藿香半兩巴豆二十粒丁香四十九粒粟米一合上先將粟米巴豆肉同炒今赤色去巴豆不用只使粟米與香同研為末每服二錢米飯調下大黃湯治冷涎翻辦其候欲發時先流冷涎次則吐食此乃勞證治之不早死在旦夕大黃一兩生薑自然汁半茶盞炙大黃今又淬薑汁中如此淬盡切焙為末上每服二錢陳爐子一撮蔥白二莖水一大盞煎至七分先食蔥白次服其藥不十日去根又方治翻胃吐食白礬二兩黃丹一兩上二哧為末入瓦灌子內煅今如蒸餅虛空取出以淨紙承頓地上盆蓋一出火毒再為末用蒸飲為圓如録豆大每服三五圓至七圓空心溫酒下更量老少虛實與之又方治宿食不化嘔吐酸水胸否悶冷氣腹肺寒咳嗽並皆治之陳皮四兩生薑一兩半甘草一兩炙上㕮咀炒今黃赤色焙乾研為末每服二大錢鹽湯點服又方烏梅二個縮砂三粒胡椒二十四粒丁香十四粒巴豆四粒上為細末研飲為圓如此大每服七圓橘皮湯下治脾疼不問新久高良薑紅芍藥各等分上為末每服三錢水一盞煎五七沸食後服治丈夫婦人老少遠年日近翻胃吐食方五零脂上一味不拘多少為細末用黃犬膽汁為圓如龍眼大每服一圓好酒半盞頓湯瓶頭溫磨開服不止再服不過三服即效又方治胸膈不快酒食所傷漸成翻胃今乾嘔丁香巴豆烏梅各二十個好完合者上三味皆不去油殼並核搗三五千杵成膏入早米飲一兩同搗又二千杵今極勻細衆手圓如大慢火焙乾淨只承頓地上出火毒每服五圓或七圓茶酒熱水任下如嘔吐酸水心腹氣痛膨脹者橘皮甘草湯下治傷各有滯食哎酸銅氣心腹膨小腹不仁或時溏泄高良薑陳皮莪朮烏梅生薑甘草乾薑已上各等分上用好紅椒二十粒去子同研為細末每服二錢水一盞薑三片煎至七分溫服治丈夫婦人心氣刺痛不可忍者頭髮燒灰存性為末丁香七粒上為末酒一盞煎十數沸溫服立效治噁心翻胃厚朴薑汁浸炙蒼朮橘皮甘草各三兩上為細末每服一大錢空心鹽湯點服東京王先生傳脾疼藥方江子半兩新瓦器中炒今黃色杏仁半兩同牽牛半兩同橘皮一兩同上件併為末用醋糊為圓如此大每服十圓薑湯下婦人血氣醋湯下産後氣痛艾湯下五圓丈夫酒食所傷隨物下小兒驚熱飯湯下疳積飯飲下蛔蟲腹痛史君子七枚為末湯下治脾疼不可忍及療冷氣疼陳茱萸二兩浮椒一兩蚌粉一兩炒赤色上件為末散糊為圓如梧桐子大每服五圓用浸酒鹽湯任下遇發時服甚者不過二三服立有功效治脾積氣痛婦人諸般氣痛香附子五兩莪朮甘草各二兩上事治今淨研為細末每服二錢入鹽少許百沸點空心熱服又方良薑四兩甘草一兩桂花半兩上為末每服一大錢籬鹽沸湯點服治脾疼神效方荔枝核上一味不拘多少為末每服二錢熱醋湯調下官司方七香圓丁香檀香丁香皮木香陳皮甘松三稜莪朮縮砂白豆蔻已上各半兩香附子四兩上為末用曲餅湯泡和藥為圓如録豆大每服二十圓細嚼生薑湯下治中酒不醒兼有酒食傷巴豆一粒烏梅二個丁香三粒胡椒五粒上同搗為細末入飯同杵二三千下為圓如大每服五圓七圓細嚼丁香湯下小兒一圓與服
