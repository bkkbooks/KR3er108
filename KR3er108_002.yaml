body:
  text: 卷二治諸積熱等疾治腳氣毒遍內外煩熱不解口中生瘡狂走毒歷及解中諸熱藥毒邪熱卒黃等解蟲毒鬼魅野道熱毒又治小兒驚癇熱病寒水石石膏磁石滑石已上四味各三斤搗為末用水一石煮至四斗去滓入後藥玄參羚羊角四兩升麻五兩丁香木香半兩甘草八兩憶上六味搗為末入前藥汁中再煮去一斗五升去滓入下頃二味朴硝三斤消石好者二斤已上二味入前藥汁中微火煎不住持柳木篦攪候有七八升許投在水盆中半日久欲凝後卻入後頃二味硃砂三兩麝香一兩三錢重乳細已由三味入前藥汗中拌調今全勻上當寒之二日每服一錢匕或二錢冷水調下大人小兒子細加減食後服又方治大人小兒五臟積熱煩躁多渴唇烈喉閉目赤鼻衄頷頰結硬口舌生瘡陽明證傷寒發狂見鬼譫語大小便祕一切風壅亞皆治之川大黃山梔子仁一兩朴硝二兩連翹薄荷二兩甘草一兩乾葛赤芍藥一兩上為銼散每二錢不一盞入竹葉七片蜜三匕同煎至七分去滓食後服法陽明證傷寒空心下此藥局方亦載緣味數與藥不同豫唯一之用大侄段婦忽患熱病欲死付之一服立效後來屢服屢驗伏幸母忽又方白朮荊芥赤芍藥各三兩大黃車前子各二兩生木通三兩甘草二兩川當歸二兩上為細末大便祕結米泔調三錢空心服上膈壅熱或生赤丹或如癰癤用水二盞煎三大錢服小便結如淋狀用蘆根打碎淨洗煎湯調下五心煩熱生薑一片同煎三錢服此方初來之不得後費數緡轉託來之至三方始得之屢服有效東京金宅能腦圓治胸中鬱熱肺熱喘嗽口臭喉腥脾疸口甘丈夫吐血婦人血崩並皆治之龍腦薄荷五兩真蒲黃一兩麥門冬二兩阿膠一兩甘草一兩半人參一兩川當歸一兩黃耆一兩半木通一兩生乾地黃柴胡半兩上為末煉蜜圓如梧桐子大每服二十圓病上焦飯後用熟水吞下微嚼破更好病下焦空心服小兒加減與之此藥大有奇效不可盡述又方治男子女人小兒胃中客熱口臭牙宣赤眼口瘡一切瘡疹已發未發或可服之熟地黃生地黃天門冬黃芩枇杷葉山茵陳枳殼金叉石斛甘草已上各三兩犀角三錢上為末每服二錢水一盞煎至七分去滓食後臨溫服小兒一服分作二服更苦斟酌與之此方得某一品之家其間用犀角一味甚有道理百發百中豫族中有一僕牙宣口臭牙齒漸至頽落豫與二服立愈服之無不效者本事方前集所未載上數方緣得這不易今不欲為之已有不能廣利一切謹附此與衆共之明醫者必歎賞又方解一切暑毒欲死者使服之立蘇半夏四兩醋一升半煮盡醋焙乾甘草一兩桂半兩赤茯苓二兩白茯苓一兩上為末用生薑汁作麵糊為圓如大每服五十圓熱水下豫夏月登途嘗藉此藥於篋笥中諸緩急及僕價門每日一服終無伏暑之疾奇驗不一治諸風等疾治八般頭風草烏尖細辛等分黃丹少許上為經末葦管搐入鼻中立效治偏頭風五荊主云禁中祕方上用好蘿蔔自然汁一蟬殼樣患人仰臥石疼注左左疼注石或兩邊皆疼皆注之雖十年患者亦效王荊公患十二年用之立效後醫數人皆愈治頭痛及腦風神砂圓鹽硫黃各等分上為末水調生面為圓如梧桐子大每服十五圓用薄荷茶食前下荊薺酒亦得又方定頭疼楊梅青硝石地龍各等分道按楊梅青即空青無水者上為細末搐鼻立效上件四方得自至人纍試有驗余鄉間有富室就余傳此方修全施人治偏正頭風夾腦風並一切頭風不問年深日近剋日取效名透頂散細辛長白者三莖瓜蒂七個丁香三粒腦子一豆大麝香一黑豆大上先將腦麝乳鉢內研今極細卻將前四味碾內事治為末入乳鉢內蕩起腦麝今勻用瓦罐子盛之堅新罐口患人隨左右搐之一大豆許量久出冷涎一升許師安清頭風去邪順真氣羌活殭蠶各一兩白蒺藜去尖炙一兩甘菊一兩白附子一兩硃砂一兩麝香一兩上為細末每服一錢薄荷茶酒任意調下治丈夫婦人風虛頭疼氣虛頭疼婦人胎前産後傷風頭疼一切頭疼並皆治之茵陳五兩麻黃石膏煅留性各二兩上為末每服一錢腦茶下食後服服畢仰臥治風屑極燥無時此乃氣虛風侵邪於皮表而生焉須此藥治之甚妙藜蘆根上一味不拘多少為末先洗頭須避風好最候未至十少干時用藥摻定須用藥末入發至皮方得緊縛之兩日夜次日全無亦不燥癢如尚有些少可再用一次立效又方香白芷零陵香各等分上為末如前法用之候三五日後篦去再付三二次終世不生治頭風荊芥散王大醫方荊芥石膏各等分煅上為細末每服二錢薑三乍蔥白三寸和鬚使水一盞同煎至七分食後服治偏頭風方豬牙皂去皮筋香白芷白附子各等分上為末每服一錢臘茶下右疼右側臥左疼左側臥兩邊皆疼仰臥食後服治急中風中閉涎上欲垂死者一服即瘥江子二粒去皮膜白礬一塊如大拇指大末之按江子即巴豆上二味於新瓦上煅今江子焦赤為度為末煉蜜丸如雞頭大每服一圓用綿里於患人口中近喉如良久吐痰立效治頭風頭暈目旋太陽穴痛不思飲食藿香茯苓香附子各一兩上為末每服二錢茶清調下日三服清頭目避風氣蒼朮四兩荊芥甘草各一兩上三味為細末每服一大錢沸湯點早晨服凡入煙瘴之地宜修合隨行余昔入廣合合一劑每日一服及歸不染瘴而至僕價門亦嘗與之無染瘴疾者又況能清頭目效驗多端治大人小兒驚風退熱取涎牛黃散硃砂一錢麝香一字腦子真者半兩水銀一錢牛黃一字狗黃一字雄黃一字今香半兩道按狗黃即賓今香即零陵香上為末將前四味為末頓處後四味末放一處臨時和勻每服一字或半錢薄荷湯入金銀箔同調下如用取涎入江子二粒去油藥三錢和勻可服半字薄荷茶清調下量大小虛實加減與之生津液玉液膏紫蘇四兩板桂半兩甘草白梅肉各二兩上將上三味為末搗白梅肉為圓加雞頭大每服含化三圓治一切頭疼防風川芎各一兩附子七錢重者一個炮去皮臍上為末每服一字荊芥薄荷茶調下治傷寒頭疼並太陽頭疼及一切頭風川烏炮草烏各半兩麻黃一兩半川芎防風羌活土龍去土金蠍十個雄黃三錢上為末每服半錢食後清茶調下又方川芎一兩細辛半兩香附子羌活蒼朮各一兩薄荷二兩甘草三錢白芷二兩甘菊一兩荊芥二十文茵陳五文上為末每服二錢茶清調下婦人産後傷風頭疼用當歸末石膏末同調下頭風方香附子一斤炒赤烏頭一兩炒赤甘草二十文上為末煉蜜圓如彈子大每服一圓蔥茶嚼下治纏喉風白礬半錢烏雞子清上二味調勻灌入喉內立效如神此方活人不記數幸勿忽治中風手腳不遂此方甚妙穿山甲二兩川烏頭二兩紅海粉一兩上為末每服半兩用生蔥自然汗調成膏厚作餅子約徑寸半闊左患貼左腳右患貼右腳貼在足掌心內用舊絹片緊批定於密房中無風處椅子上陲用湯一盆將有藥腳浸於湯中用小心人扶病人若汗出即急去了藥出汗遍身麻木即輕減漸至無事此妙不可言治大風神效追命散川大黃皂角刺各半斤川鬱金五兩上三味為細末每服三大錢用真大楓油入無灰酒溫調藥末臨睡時服臟腑轉時只就地上取下蟲如疾多年其蟲色黑日近者其蟲色赤隔三兩日再服直候無蟲方是病瘥即止其藥只服平常風藥及諸補藥此藥大有奇效下藥切不可許病人知恐蟲藏𧈟則病雞愈六十日內用清齊戒房色歇卻一切俗念亦不可嗔怒常淨口念阿彌陀佛及救苦難觀世音菩薩遍數百萬聲最好緣此疾乃業障果報若用藥醫得病可之後恐促其壽故用念佛懺悔伏幸聽信斯言至祝治風解毒雄黃救命散雄黃二錢重川鬱金二錢重巴豆四十粒去油上為細末用醋糊為圓如録豆大每服三圓至五圓茶清冷下治病於後治纏喉風走馬風喉閉卒中仆地失音以至牙關緊急不知人事每服七圓熱灌茶下甚者不過二服吐出涎立蘇有至死者但心頭暖用鐵物抑開口之藥咽喉無不活者或吐或瀉些少不妨或上膈壅並宜服之小兒驚風量太少加減與之治一切風中及左癱右瘓口眼喎邪一切風疾皂角三莖刮去黑皮並子一莖酒浸一莖燒留性一莖炙薄荷三兩黑牽牛三兩何首烏十二兩上先將皂角為末入水得其中熬成膏卻入後三味搗一二千杵寫圓如梧桐子大每服二十圓茶酒任下
