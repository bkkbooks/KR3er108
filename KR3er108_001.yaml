body:
  text: 卷一治諸虛進食生血氣並論夫人稟陰陽五行運氣榮衛而保全其身一凡身中或有毫杪疾患無非因臟腑虛冷臟腑虛冷則榮衛不調榮衛不調則疾生矣又況虛冷之極又能生其虛陽或手足腰腎及眼目口齒三焦六腑值病之亟則各能死人且如左右手三陽三陰十二經脈皆須用有胃氣或加之有疾而無胃氣者不問病之輕重不救何謂須用有胃氣緣胃受穀氣生則能生氣血氣血壯則榮衛不衰榮衛不衰則病自去矣如五臟六臟表裡之間皆出自穀氣而相傳授生氣血而灌蔭五臟或氣血不足則五臟六臟蔭無所自況加之於優愁思慮喜怒不常起居勞役飲水不節房事過多衛雪胃霜伏暑鬱熱損失耗散則病生焉且如季春季夏季秋季冬一十八日之間脾土於此時旺極每遇此際腎水受克故當補腎所以心肺肝脾腎各有衰旺各有相生相剋如心克肺肺克肝肝克脾脾克腎腎克心遇旺則克之愈甚凡受克處故宜補然春補肺秋補肝冬補心古之腎人平居無病亦常用方藥法度調護脾胃使進飲食而全穀氣凡百皆得其宜如今之庸醫用意皆錯姑舉一二而為證然且如腎經衰敗則以天雄附子之類而言補腎且腎本屬北方壬癸水喜濕惡燥反用天雄附子至燥藥豈能補乎腎耶況腎經虛則乃五臟六腑衰極而漸至腎則諸病生焉凡下部腎經虛者不必補之至妙之法有二一則但補脾護胃使進飲食而全穀氣一則所謂生血氣者或生日夜半子時乃北方正候當此之時腎水旺極則攝血化精精氣全則實腎經不虛病自去矣男子則攝血化精女子可通月事若谷不全則氣血不生氣血不生則當夜半子時腎水雖腎旺則血不能償其腎所攝無精可化丹田不固腎自虛矣以此觀之凡腎經並五臟虛則醫者不識源流枉用其法初不能損於病乎今則具列先補脾胃後調氣血二方並法悉皆備集豫不欲私為已有用傳好事云耳戊巳圓治丈夫婦人稟賦怯弱飲食無味氣血衰敗肌肉不生項背拘緊腰腳無力胸膈膨膈脹多睡少寤終日錯朦夜多異夢及積年脾蟲時下噁心噫酸吐水小兒吐乳大人翻胃並皆治之此藥能護脾開胃進食長肌肉生氣血化清益髓全胃氣丹田不竭腎經不虛是此藥功也茴香三兩揀淨甘草一兩炙浮椒五兩乃胡椒也揀淨人參一兩白朮二兩硃砂半兩白茯苓三兩香附子半兩上為細末生薑汁麵糊為圓如梧子大每服二十圓空心白湯送下服又方石菖蒲二兩白茯苓三兩白朮二兩茴香一兩半青皮一兩枳殼一兩麩炒去穰上為末每服二大錢棗湯調空心服又方枳殼二兩木香一兩半丁香半兩青皮一兩半去白牡蠣二兩半甘草白茯苓一兩上為細末米飲送下三錢不計時候上為細末飲送下三錢不計時候又方治大人婦人小兒唇青面黃肚裡冷痰牽引小腹以至翻胃換食嘔吐口苦舌乾少寤腳手不制遠年日近一切脾冷病悉能除愈有一婦人年四十餘患十年翻胃面目黃黑壓三十餘人醫不取效脾腧諸穴燒穴灸交遍其疾愈甚服此藥不五七日間頓然無事緊忍服至一月日遂去其根自是服之不三五服些少脾疾立便痊平能全胃氣生肌肉進飲食順榮衛常服大有補益悉試悉驗幸母忽焉人參一兩茯苓二兩附子七錢重炮去皮臍一兩牡蠣一兩煅粉草半兩黃耆一兩鹽炙上為末每服三大錢鹽湯點服忌生冷油麵黏膩等毒物無不效者甚妙又方浮椒二兩茴香二兩粉草一兩上三味每為末服二錢熱湯點服忌毒如前化症圓治丈夫婦人小兒年深日近沉積症塊面色黃青時上搶心吐水吞酸舌生白沫婦人積年月經不調漸成血氣或蠱塊中焦之間復如杯碗連年纍月漸至瘦瘠寒熱往來一切脾胃受寒久不痊愈之疾並皆治之巴豆五兩去油膜蓬莪朮三兩醋煮三稜三兩醋煮丁香皮二兩木香一兩半厚朴三兩石菖蒲二兩良薑一兩虻蟲一兩半川牛膝一兩香附子四兩石連二兩上為細末稀麵糊為圓如小菉豆大積年癥瘕成塊第一服用熟水下二十圓自後每日三圓五圓更量虛實加減與之五日去盡積塊日近脾胃有積者每服五圓飯飲吞下一服取效婦人血氣成塊及血瘕每服二十圓蘇木用酒童子小便各一半煎五七沸今溫空心吞下自後每日用溫酒下三圓其血塊逐旋消從大小二便去儘自知小兒蛔蟲腹痛不能忍日夜呌喚百藥不救者橘皮湯下七圓立效諸蟲皆下常服白湯工薑湯下三五圓中酒及酒積大便鮓臭者白湯舊酒各半吞下七圓立效如神一切噫塞心下硬痛皆用棗湯下五圓不拘時候衛真湯治大人婦人元氣衰憊榮衛怯弱真陽不固三焦不和上盛下虛夜夢鬼交覺來盜汗面無精光唇口乾燥耳內蟬鳴腰背倦痛心氣虛乏精神不寧驚悸健忘飲食無味日漸瘦悴外腎濕癢夜多小便腰重冷疼牽引小腹足膝緩弱行步艱難婦人血海久冷經候不調或遇期不至或一月兩來赤白帶下漏分五色子宮感寒久不成孕並皆治之此藥大能生氣血遇夜半子時腎水旺極之際償腎收攝男子攝男子攝血化精實丹田填五臟諸病未萌之前皆能制治使不復為梗是藥也每服多寡具列在前川當歸三兩人參一兩半金叉石斛五兩茯苓木香肉豆蔻山藥各三兩生地黃二兩半熟地黃三兩丁香一兩川牛膝二兩童子小便酒各半浸一宿上為細末每服三大錢溫酒調下鹽湯亦得空心食後一服婦人諸疾用童子小便問溫舊酒調空心下丙丁圓生血養氣升降水火化精補腎附子一個九錢重者炮川烏一個七錢重者炮當歸二兩赤芍藥五兩沉香五兩上為細末浸當歸酒煮稀糊為圓如梧桐子大硃砂為衣每二十圓漸加三十圓食前空心鹽湯酒下婦人淡醋湯下又方治男子婦人一切虛冷之疾活血駐顏減小便除盜汗治婦人久不生産似滯疾而非其時有遺瀝並皆治之功驗不可具述蒼朮吳茱萸破故紙胡盧巴已上各一兩川薑草烏巳上各半兩並炮山藥二兩上各炮治同為末醋糊圓如梧桐子大每服十五圓空心溫酒鹽湯任下婦人艾醋湯下日二服丈夫四十歲巳上者可常服耳目永不昏髭發不白又方回陽小浴法川烏沉香紫稍花疾藜蛇床子酒浸一兩兔絲子各等分上為末冷熱水圓如彈子大每服一圓湯三大碗椒二合蔥二握用闊口瓶同煎二碗去卻蔥根椒安身於瓶口上薰如入得手則浴之冷便止女人帶下赤白者依此薰之留藥得三次溫過薰洗妙又方治後生大人婦人房事不節漸至虛損行步如踏空夜夢從高墜下及夢大小諸般水等並皆治之常服永無虛病雖二十歲亦可服人參白茯苓川牛膝酒浸一兩地骨皮真者川當歸熟地黃各等分上為末煉蜜為圓如梧桐子大每服三十圓溫酒或鹽湯空心下常服只二十圓用三五匙乾飯壓下服三五日後每日飽飯後及臨臥時服局中雞蘇圓五粒不嚼破熟水吞下次又服前藥百病皆去雖百歲髭發不白此藥余曰二十歲服之不歇甚妙又方治後生丈夫酒色過多下元虛憊膝軟乏小便滑數外腎濕癢兔絲子五兩石連肉二兩白茯苓一兩山藥二兩茴香二兩五味子五兩上為末稀糊為圓如豆每服四十圓溫酒或鹽湯空心下如腳氣及腳膝無力者木瓜酒空心五十圓晚餐前再服立效又方補虛損老少皆可服一切虛證並皆用之人參桂茯苓黃耆熟乾地黃川芎甘草川當歸各等分上各依法事治為末每服二大錢不一盞生薑三片棗子二枚同煎至七分空心服又方治勞嗽及虛證及鼻清涕耳作蟬鳴眼見黑花一切虛證丈夫婦人皆可服少年服亦不妨北五味子二兩鱉甲三兩厚物地骨皮三兩上為末煉蜜圓如梧桐子大空心食前溫酒或鹽湯任意服三十五十圓婦人醋湯下此方乃曲江人家祕方余服之大有功效處方有理者人皆欽羡妙甚妙甚又方補虛損治勞倦一切虛極欲垂死者甘草三兩蒼朮一斤米泔浸一宿切作片子用菲白一斤細切同今庵過一宿川椒四兩草烏半斤水浸一宿切作片子同鹽四兩今庵一宿次日炒乾上共為末用好舊糟六斤同搗三五十杵今勻為圓如梧桐子大每服二十三十圓空心溫酒鹽湯任下婦人淡醋湯下又方治胸滿氣噫下部冷腹㽲痛半夏八兩生薑六兩橘皮四兩桂二兩吳茱萸五兩湯泡洗一次石㕮咀用水十升煮取四升分五服冷又再溫空心食前服余少年時曾患臍腹㽲痛初不穎其虛遍服諸家藥無獲效者余遂診之則覺是虛證合此藥一劑服未至半劑頓然痊瘥又方治下部冷極臍下及小腹痛不可忍者一服取效赤石脂乾薑各十兩上二味麵糊圓如碗豆大每服十圓至三十圓空心飯飲下日三服御方二仙散治腎氣蓬莪朮一兩茴香二兩阿魏三錢真者上三未為末每服一錢溫酒調下金鎖正陽丹砒一兩火煅巴豆十兩去油烏頭一兩炮木鱉六個雄黃半兩石以上併為末用黃臘瀝青好者各一兩半黃丹一兩硃砂一兩半細研溶熱入前頃藥末乘熟圓如雞頭子大每服一圓常服空心鹽湯下小腸氣痛炒茴香酒冷下木通煎湯下滑腸脫肛乾薑艾同煎酒溫下心氣痛燒錢淬醋下二圓氣塊齧干子下一圓婦人紅脈不行及産後諸疾當歸酒下眼多冷淚鹽椒湯下
